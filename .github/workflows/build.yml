name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: IconoParser-suite-linux
            bundle-name: IconoParser-suite-linux
          - os: windows-latest
            artifact-name: IconoParser-suite-windows
            bundle-name: IconoParser-suite-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller

      - name: Build executables
        run: |
          pyinstaller --noconfirm IPGUI.spec
          pyinstaller --noconfirm IconoParserGUI.spec
          pyinstaller --noconfirm saveEditor.spec
          pyinstaller --noconfirm cutsceneVis.spec
          pyinstaller --noconfirm warpGUI.spec

      - name: Package bundle (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/${{ matrix.bundle-name }}
          cp dist/IPGUI dist/${{ matrix.bundle-name }}/
          cp dist/IconoParserGUI dist/${{ matrix.bundle-name }}/
          cp dist/saveEditor dist/${{ matrix.bundle-name }}/
          cp dist/cutsceneVis dist/${{ matrix.bundle-name }}/
          cp dist/warpGUI dist/${{ matrix.bundle-name }}/

      - name: Package bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.bundle-name }}" | Out-Null
          Copy-Item "dist/IPGUI.exe" "dist/${{ matrix.bundle-name }}/"
          Copy-Item "dist/IconoParserGUI.exe" "dist/${{ matrix.bundle-name }}/"
          Copy-Item "dist/saveEditor.exe" "dist/${{ matrix.bundle-name }}/"
          Copy-Item "dist/cutsceneVis.exe" "dist/${{ matrix.bundle-name }}/"
          Copy-Item "dist/warpGUI.exe" "dist/${{ matrix.bundle-name }}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.bundle-name }}/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archives
        run: |
          cd artifacts
          zip -r IconoParser-suite-linux.zip IconoParser-suite-linux
          zip -r IconoParser-suite-windows.zip IconoParser-suite-windows

      - name: Publish release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LINUX_ASSET="artifacts/IconoParser-suite-linux.zip"
          WINDOWS_ASSET="artifacts/IconoParser-suite-windows.zip"

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            gh release upload "$TAG" \
              "$LINUX_ASSET" \
              "$WINDOWS_ASSET" \
              --repo ${{ github.repository }} \
              --clobber
          else
            gh release create ${{ github.ref_name }} \
              "$LINUX_ASSET" \
              "$WINDOWS_ASSET" \
              --repo ${{ github.repository }} \
              --title "Release ${{ github.ref_name }}" \
              --generate-notes
          fi
